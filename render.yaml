services:
  - type: web
    name: skill_swap
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers 1 --bind 0.0.0.0:$PORT
```

Everything else stays exactly the same. Your folder structure:
```
Skill_swap/
├── app.py
├── index.html
├── requirements.txt
└── render.yaml